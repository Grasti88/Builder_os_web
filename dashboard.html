<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Builder OS Dashboard</title>
<link rel="stylesheet" href="assets/style.css">
<style>
.hero {
  background: linear-gradient(135deg, #3b82f6, #06b6d4);
  color: #fff;
  padding: 60px 20px;
  text-align: center;
  border-radius: 0 0 20px 20px;
}

.hero h1 { font-size: 2.5em; margin-bottom: 10px; }
.hero img { max-width: 300px; margin-bottom: 20px; }

.features {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  margin: 40px 0;
}

.feature-card {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  width: 250px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  transition: transform 0.3s, box-shadow 0.3s;
}

.feature-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 12px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<header class="hero">
  <h1>Builder OS Dashboard</h1>
  <img src="assets/dashboard.png" alt="Dashboard Screenshot">
</header>

<nav style="text-align:center; margin:20px 0;">
  <a href="index.html">Home</a> |
  <a href="dashboard.html">Dashboard</a> |
  <a href="download.html">Download</a> |
  <a href="docs/docpage.html">Docs</a>
</nav>

<main>
  <section class="features">
    <div class="feature-card">
      <h3>Project Overview</h3>
      <p>Track all your active projects at a glance.</p>
    </div>
    <div class="feature-card">
      <h3>Analytics</h3>
      <p>Monitor workflow and performance metrics.</p>
    </div>
    <div class="feature-card">
      <h3>Notifications</h3>
      <p>Stay up-to-date with project updates and alerts.</p>
    </div>
  </section>
</main>

</body>
</html>
